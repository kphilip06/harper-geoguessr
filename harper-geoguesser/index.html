<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="UA.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harper GeoGuessr</title>
    
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
</head>
<body>

  <div id="tsparticles"></div>

  <header class="site-header">
    <div class="header-left-group">
      <a href="https://www.harpercollege.edu">
      <img src="Assets/UI/harper-logo.webp"
           alt="Harper College Logo" 
           class="logo-button">
      </a>
    </div>
    <a href="#" class="header-signin">Sign In</a>
  </header>

  <main class="page-content">
    <div class="auth-layout-wrapper">
        
        <div class="leaderboard-container">
            <h2>Leaderboard</h2>
            <div id="leaderboard-list">
                </div>
        </div>

        <div class="login-card">
            <h1>Harper GeoGuessr</h1>
            <p>Explore Campus!</p>
            
            <button id="login-btn" class="btn-google">
              <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;">
              Sign in with Google
            </button>
        </div>

    </div>
  </main>

 <script src="https://cdn.jsdelivr.net/npm/@tsparticles/slim@3.0.3/tsparticles.slim.bundle.min.js"></script>

<script>
    window.addEventListener('DOMContentLoaded', async () => {
        if (typeof tsParticles !== 'undefined') {
            if (typeof loadSlim !== 'undefined') {
                await loadSlim(tsParticles);
            }

            await tsParticles.load({
                id: "tsparticles",
                options: {
                    fpsLimit: 120,
                    detectRetina: true,
                    particles: {
                        color: { value: "#ffffff" },
                        number: {
                            density: { enable: true, area: 800 },
                            value: 180 
                        },
                        opacity: {
                            value: { min: 0.1, max: 0.8 },
                            animation: { enable: true, speed: 1, sync: false }
                        },
                        shape: { type: "circle" },
                        size: { 
                            value: { min: 0.5, max: 4 } 
                        },
                        zIndex: {
                            value: { min: 0, max: 100 },
                            opacityRate: 0.8,
                            sizeRate: 0.8,      
                            velocityRate: 0.8   
                        },
                        move: {
                            enable: true,
                            speed: { min: 1, max: 3 }, 
                            direction: "none",
                            straight: false,
                            outModes: { 
                                default: "out" 
                            },
                            random: true,
                            attract: {
                                enable: true,
                                rotate: {
                                    x: 600,
                                    y: 600
                                }
                            }
                        } 
                    },
                    interactivity: {
                        events: {
                            onHover: {
                                enable: false
                            }
                        }
                    }
                }
            }).catch((error) => {
                console.log("Particles engine caught structural shift:", error);
            });
        }
    });
</script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script src="app.js"></script>
</body>
</html>
